<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>카테고리 등록</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>.field-error { color: #bd2130; }</style>
</head>
<body>
<div class="container">
    <h2>새 카테고리 등록</h2>

    <form th:action="@{/categories/create}" th:object="${categoryForm}" method="post">
        <div>
            <label th:for="name">카테고리 명:</label>
            <input type="text" th:field="*{name}" placeholder="이름을 입력하세요">
            <p class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Incorrect date</p>
        </div>

        <div style="margin-top: 10px;">
            <button type="submit">등록</button>
            <a th:href="@{/categories}">취소</a>
        </div>
    </form>

    <hr>
    <footer style="margin-bottom: 50px;">
        <p th:text="${'실습 수행: ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss') + ' | 학번: 2371494 | 성명: 문경록'}"></p>
    </footer>
</div>
</body>
</html>
